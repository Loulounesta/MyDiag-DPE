        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--tx); margin: 0; padding-bottom: 100px; line-height: 1.5; }

        .tab-btn { padding: 12px 20px; border: none; background: none; font-size: 13px; font-weight: 700; color: var(--tx-l); cursor: pointer; border-bottom: 3px solid transparent; }

        .container { padding: 15px; max-width: 800px; margin: auto; }

        .appt-card { background: white; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 10px; overflow: hidden; }
        .appt-header { padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; background: #fff; cursor: pointer; }
        .appt-header:active { background: #f1f5f9; }
        .appt-body { padding: 0 15px; max-height: 0; overflow: hidden; transition: all 0.3s ease-out; background: #fafafa; border-top: 0px solid #eee; }
        .appt-body.open { padding: 15px; max-height: 2000px; border-top-width: 1px; }
        
        /* Formulaires */
        .inp { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
        .btn-p { background: var(--acc); color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 700; width: 100%; cursor: pointer; }
        .qbtn { background: white; border: 1px solid #cbd5e1; padding: 10px; border-radius: 8px; font-size: 12px; font-weight: 600; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .quick-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
