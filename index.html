<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyDiag - Assistant Expert</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; --txt: #0f172a; --s: #10b981; --accent: #64748b; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding-bottom: 100px; color: var(--txt); }
        .header { background: white; padding: 12px 16px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .logo { font-weight: 800; color: var(--p); font-size: 1.1rem; }
        .nav-tabs { display: flex; background: #1e293b; position: sticky; top: 50px; z-index: 1900; width: 100%; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 16px 12px; border: none; background: none; font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; white-space: nowrap; }
        .tab-btn.active { color: white; border-bottom: 3px solid var(--p); background: rgba(255,255,255,0.05); }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .view { display: none; }
        .view.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 18px; margin-bottom: 12px; border: 1px solid #e2e8f0; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        h3 { margin: 0 0 15px 0; font-size: 0.8rem; color: var(--accent); text-transform: uppercase; border-left: 3px solid var(--p); padding-left: 10px; }
        label { font-size: 0.65rem; font-weight: 800; color: #64748b; display: block; margin: 8px 0 3px 5px; text-transform: uppercase; }
        input, select { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 14px; background: #fff; margin-bottom: 5px; }
        .btn { padding: 16px; border-radius: 10px; border: none; font-weight: 800; width: 100%; cursor: pointer; color: white; margin-top: 10px; }
        .btn-p { background: var(--p); }
        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 14px; background: white; border-radius: 10px; border: 1px solid #e2e8f0; margin-bottom: 8px; font-weight: 700; }
        .item-row.selected { border: 2px solid var(--p); background: #eff6ff; }
        .data-list { font-size: 0.7rem; color: #475569; padding: 8px; border-bottom: 1px solid #f1f5f9; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">MyDiag <span style="font-weight:400; color:var(--accent);">Expert</span></div>
    <div style="font-size:0.6rem; font-weight:bold; color:var(--s);">● PHYSIQUE ACTIVE</div>
</div>

<nav class="nav-tabs">
    <button class="tab-btn active" id="b-home" onclick="go('home')">Projet</button>
    <button class="tab-btn" id="b-lots" onclick="go('lots')">Lots</button>
    <button class="tab-btn" id="b-murs" onclick="go('murs')">Parois</button>
    <button class="tab-btn" id="b-baies" onclick="go('baies')">Baies</button>
    <button class="tab-btn" id="b-expo" onclick="go('expo')">Export</button>
</nav>

<div class="container">
    <div id="vw-home" class="view active">
        <div class="card">
            <h3>📂 Dossier</h3>
            <label>Référence</label><input type="text" id="cp-c" oninput="sv()">
            <label>Nom Résidence</label><input type="text" id="cp-n" oninput="sv()">
            <button class="btn btn-p" onclick="init()">Initialiser les Lots</button>
        </div>
    </div>

    <div id="vw-lots" class="view"><div id="list-lots"></div></div>

    <div id="vw-murs" class="view">
        <div class="card">
            <h3 id="mur-t">Sélectionnez un lot</h3>
            <div id="f-mur" style="display:none">
                <label>Type de Paroi</label>
                <select id="m-type-p"><option value="MUR">Mur extérieur</option><option value="PLAFOND">Plafond / Toiture</option><option value="SOL">Plancher bas</option></select>
                
                <div style="display:flex; gap:10px;"><input type="number" id="m-l" placeholder="Long."><input type="number" id="m-h" placeholder="Haut./Larg."></div>
                
                <label>Donne sur</label>
                <select id="m-ds">
                    <option>Extérieur</option>
                    <option>Local non chauffé (LNC)</option>
                    <option>Circulation commune</option>
                    <option>Parking / Sous-sol</option>
                    <option>Combles perdus</option>
                </select>

                <label>Doublage / Lame d'air</label>
                <select id="m-doub">
                    <option>Absent</option>
                    <option>Lame d'air < 15mm</option>
                    <option>Lame d'air >= 15mm</option>
                    <option>Inconnu</option>
                </select>

                <label>Isolation (ADN)</label>
                <select id="m-i"><option>Non isolé</option><option>Isol. Intérieure</option><option>Isol. Extérieure</option><option>Isol. Répartie</option></select>
                
                <button class="btn btn-p" onclick="addM()">Enregistrer Paroi</button>
            </div>
        </div>
        <div id="list-m"></div>
    </div>

    <div id="vw-baies" class="view">
        <div class="card">
            <h3 id="baie-t">Sélectionnez un lot</h3>
            <div id="f-baie" style="display:none">
                <label>Menuiserie</label>
                <select id="ba-m"><option>PVC</option><option>Bois</option><option>Alu Rupture</option><option>Alu Simple</option></select>
                <label>Vitrage</label>
                <select id="ba-v"><option>Simple vitrage</option><option>Double vitrage</option><option>Double Vitrage VIR</option></select>
                <button class="btn btn-p" onclick="addB()">Enregistrer Baie</button>
            </div>
        </div>
        <div id="list-b"></div>
    </div>

    <div id="vw-expo" class="view">
        <div class="card"><button class="btn" style="background:#10b981" onclick="xp()">📊 EXPORT ADN ANALYSIMMO</button></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('diag_v14_2') || '{"l":[],"m":[],"b":[],"co":{}}');
    let cur = null;

    function go(id) {
        document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('vw-'+id).classList.add('active');
        document.getElementById('b-'+id).classList.add('active');
        if(id==='lots') renderL();
        if(id==='murs') renderM();
        if(id==='baies') renderB();
    }

    function sv(){ db.co.c=document.getElementById('cp-c').value; db.co.n=document.getElementById('cp-n').value; localStorage.setItem('diag_v14_2',JSON.stringify(db)); }

    function init(){
        db.l = [];
        for(let b=1;b<=2;b++){ for(let i=1;i<=3;i++){ db.l.push({id:`b${b}l${i}`, n:`Lot ${i} - Bât ${b}`, s:0}); } }
        sv(); go('lots');
    }

    function renderL(){
        const c = document.getElementById('list-lots');
        c.innerHTML = db.l.map(l => `
            <div class="item-row ${cur===l.id?'selected':''}" onclick="sel('${l.id}','${l.n}')">
                <span>${l.n}</span>
                <input type="number" style="width:70px; padding:5px; margin:0;" value="${l.s}" onchange="upS('${l.id}',this.value)" placeholder="m²">
            </div>`).join('');
    }

    function sel(id, n){ cur=id; renderL(); document.getElementById('mur-t').innerText=n; document.getElementById('baie-t').innerText=n; document.getElementById('f-mur').style.display='block'; document.getElementById('f-baie').style.display='block'; }

    function upS(id, v){ db.l.find(x=>x.id===id).s=parseFloat(v)||0; sv(); }

    function addM(){
        const s=(parseFloat(document.getElementById('m-l').value)*parseFloat(document.getElementById('m-h').value)).toFixed(2);
        db.m.push({
            lid:cur, 
            type: document.getElementById('m-type-p').value,
            s, 
            ds:document.getElementById('m-ds').value, 
            doub:document.getElementById('m-doub').value, 
            i:document.getElementById('m-i').value
        });
        sv(); renderM();
    }

    function renderM(){
        const l=document.getElementById('list-m');
        l.innerHTML=db.m.filter(x=>x.lid===cur).map(x=>`<div class="data-list"><b>${x.type}</b>: ${x.s}m² sur ${x.ds} | Doublage: ${x.doub} | ${x.i}</div>`).join('');
    }

    function addB(){
        db.b.push({lid:cur, m:document.getElementById('ba-m').value, v:document.getElementById('ba-v').value});
        sv(); renderB();
    }

    function renderB(){
        const l=document.getElementById('list-b');
        l.innerHTML=db.b.filter(x=>x.lid===cur).map(x=>`<div class="data-list">• ${x.m} | ${x.v}</div>`).join('');
    }

    function xp(){
        const data = db.m.map(x=>({
            "Lot":db.l.find(l=>l.id===x.lid).n, 
            "Type": x.type,
            "Surface":x.s, 
            "Donne sur":x.ds, 
            "Doublage":x.doub, 
            "Isolation":x.i
        }));
        const ws=XLSX.utils.json_to_sheet(data), wb=XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb,ws,"DATA_ANNALYSIMMO");
        XLSX.writeFile(wb, `RELEVE_PHYS_EXPORT.xlsx`);
    }

    window.onload=()=>{ document.getElementById('cp-c').value=db.co.c||''; document.getElementById('cp-n').value=db.co.n||''; go('home'); };
</script>
</body>
</html>
